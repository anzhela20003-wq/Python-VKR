    <script>
	        // функция для динамической подгрузки локального скрипта

	            console.warn('ошибка: не удалось загрузить файл из cdn, пробую локальный путь: ' + path);

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }

        body { font-family: 'Inter', sans-serif; }

<body class="bg-slate-50 text-slate-900">

            <div class="p-4 border-t border-slate-100 bg-white">

        <main id="main-content" class="overflow-y-auto bg-white">

            </div>
    </div>
                <h2 class="text-3xl font-black uppercase mb-6" id="lesson-title"></h2>

                <div class="space-y-6">
                    <div class="border border-slate-200 rounded-2xl overflow-hidden bg-white shadow-sm">
                        <div class="p-4 bg-slate-50 border-b border-slate-100 flex items-center justify-between">
                            <span class="font-bold text-slate-700 uppercase"><i class="fas fa-book-open mr-2"></i>теория</span>
                            <div class="flex gap-2">
                                <button onclick="toggleFullscreenChat()" class="text-slate-400 hover:text-blue-600 transition-colors"><i class="fas fa-expand-alt"></i></button>
                                <button onclick="toggleAccordion('acc-theory')"><i class="fas fa-chevron-down text-slate-400" id="icon-acc-theory"></i></button>
                            </div>
                        </div>
                        <div id="acc-theory" class="p-6">
                            <div id="lesson-theory-text" class="prose prose-slate max-w-none text-sm mb-8"></div>
                            
                            <div class="border-t border-slate-100 pt-4">
                                <div id="theory-model-badge" class="mb-2 text-[9px] font-bold uppercase text-blue-500 bg-blue-50 inline-block px-2 py-0.5 rounded border border-blue-100"></div>
                                <div id="theory-chat-history" class="space-y-3 mb-4 max-h-60 overflow-y-auto"></div>
                                <div class="flex gap-2 mb-4">
                                    <button onclick="askAIPreset('examples')" class="px-3 py-1.5 bg-blue-50 text-blue-600 rounded-lg text-[10px] font-bold uppercase hover:bg-blue-100">примеры кода</button>
                                    <button onclick="askAIPreset('simpler')" class="px-3 py-1.5 bg-indigo-50 text-indigo-600 rounded-lg text-[10px] font-bold uppercase hover:bg-indigo-100">объясни проще</button>
                                </div>
                                <div class="flex gap-2">
                                    <input type="text" id="theory-input" placeholder="задать вопрос по теории..." class="flex-1 p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:border-blue-400">
                                    <button onclick="sendTheoryChat()" class="p-3 bg-blue-600 text-white rounded-xl hover:bg-blue-700"><i class="fas fa-paper-plane"></i></button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="border border-slate-200 rounded-2xl overflow-hidden bg-white shadow-sm">
                        <div class="p-4 bg-slate-50 border-b border-slate-100 flex items-center justify-between">
                            <span class="font-bold text-slate-700 uppercase"><i class="fas fa-laptop-code mr-2"></i>практика</span>
                            <button onclick="toggleAccordion('acc-practice')"><i class="fas fa-chevron-down text-slate-400" id="icon-acc-practice"></i></button>
                        </div>
                        <div id="acc-practice" class="p-6 space-y-4">
                            <div class="flex border-b border-slate-100 mb-4">
        			<button onclick="setDifficulty('easy', this)" class="diff-btn px-4 py-2 text-[10px] font-black uppercase border-b-2 border-blue-600 text-blue-600">легко</button>
        			<button onclick="setDifficulty('medium', this)" class="diff-btn px-4 py-2 text-[10px] font-black uppercase border-b-2 border-transparent text-slate-400 hover:text-slate-600">средне</button>
        			<button onclick="setDifficulty('hard', this)" class="diff-btn px-4 py-2 text-[10px] font-black uppercase border-b-2 border-transparent text-slate-400 hover:text-slate-600">сложно</button>
    			    </div>

    			    <div id="practice-task-display" class="p-4 bg-emerald-50 rounded-xl text-sm border border-emerald-100 text-emerald-800 italic"></div>
    			    </div>
                            <div class="flex gap-2">
                                <button id="run-btn" class="px-6 py-2 bg-emerald-500 text-white rounded-xl text-xs font-bold hover:bg-emerald-600">запустить код</button>
                                <button onclick="askAIPractice('optimize')" class="px-6 py-2 bg-purple-50 text-purple-600 rounded-xl text-xs font-bold hover:bg-purple-100">оптимизировать</button>
                                <button onclick="askAIPractice('hint')" class="px-6 py-2 bg-amber-50 text-amber-600 rounded-xl text-xs font-bold hover:bg-amber-100">подсказка</button>
                            </div>
                            <div class="bg-slate-900 rounded-2xl overflow-hidden shadow-inner"><textarea id="code-editor"></textarea></div>
                            <div id="code-output" class="hidden p-4 bg-slate-900 rounded-xl font-mono text-xs text-emerald-400 border border-slate-800">
                                <pre id="output-text" class="whitespace-pre-wrap"></pre>
                            </div>
                            <div id="practice-ai-response" class="hidden p-4 bg-slate-50 rounded-xl border border-slate-100 text-sm relative">
                                <div id="practice-model-badge" class="mb-2 text-[9px] font-bold uppercase text-purple-500 bg-purple-50 inline-block px-2 py-0.5 rounded border border-purple-100"></div>
                                <div id="practice-ai-text"></div>

    <script>
        const courseData = [
    	    {
        	block: "Основы Python",
        	lessons: [
                    { 
                	t: "Переменные", 
                	theory: "Переменные — это контейнеры для хранения данных.", 
                	tasks: {
                    	    easy: "Создай переменную x = 5 и выведи её на экран.",
                    	    medium: "Создай две переменные, сложи их и выведи результат с текстом 'сумма: '.",
                    	    hard: "Поменяй значения двух переменных местами без использования третьей переменной."
                	}
            	    }
        	]
    	    }
	];

        let editor, currentLessonData;

        function initEditor() {
            editor = CodeMirror.fromTextArea(document.getElementById("code-editor"), {
                mode: "python",
                theme: "dracula",
                lineNumbers: true,
                indentUnit: 4,
                matchBrackets: true,
                autoCloseBrackets: true,
                lineWrapping: true,
                viewportMargin: Infinity
            });
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
            document.getElementById('open-sidebar-btn').classList.toggle('hidden');
        }

        function toggleAccordion(id) {
            const el = document.getElementById(id);
            el.classList.toggle('hidden');
            const icon = document.getElementById(`icon-${id}`);
            if (icon) icon.classList.toggle('rotate-180');
            if (id === 'acc-practice' && editor) setTimeout(() => editor.refresh(), 50);
        }

        function toggleFullscreenChat() {
            const chatContainer = document.getElementById('acc-theory');
            const icon = document.querySelector('[onclick*="toggleFullscreenChat"] i');
	    chatContainer.classList.toggle('chat-fullscreen');
	    document.body.classList.toggle('modal-open');
            if (chatContainer.classList.contains('chat-fullscreen')) {
	    icon.classList.replace('fa-expand-alt', 'fa-compress-alt');
	    } else {
            icon.classList.replace('fa-compress-alt', 'fa-expand-alt');
	    }
	}

        function saveApiKeys() {
            const gKey = document.getElementById('gemini-key-input').value;
            const dKey = document.getElementById('deepseek-key-input').value;
            localStorage.setItem('gemini_key', gKey);
            localStorage.setItem('deepseek_key', dKey);
            alert('ключи успешно обновлены');
        }

        function updateModelBadges() {
            const model = document.getElementById('model-select').value;
            const modelName = model === 'gemini' ? 'gemini 1.5 flash' : 'deepseek-chat';
            const theoryBadge = document.getElementById('theory-model-badge');
            const practiceBadge = document.getElementById('practice-model-badge');
            if (theoryBadge) theoryBadge.innerText = `активная модель: ${modelName}`;
            if (practiceBadge) practiceBadge.innerText = `ответ от: ${modelName}`;
        }

        function renderMenu() {
            const container = document.getElementById('module-container');
            container.innerHTML = '';
            courseData.forEach((block, bIdx) => {
                const blockId = `block-${bIdx}`;
                container.insertAdjacentHTML('beforeend', `
                    <div class="mb-3">
                        <button onclick="toggleAccordion('${blockId}')" class="w-full flex items-center justify-between p-4 rounded-2xl bg-slate-50 border border-slate-100">
                            <span class="text-xs font-black text-slate-800 uppercase">${block.block}</span>
                            <i class="fas fa-chevron-down text-[10px] text-slate-400" id="icon-${blockId}"></i>
                        </button>
                        <div class="hidden mt-2 space-y-1 ml-2 pl-3 border-l border-slate-200" id="${blockId}">
                            ${block.lessons.map((less, lIdx) => `
                                <button onclick="showLesson(${bIdx}, ${lIdx}, this)" class="lesson-item w-full text-left p-3 rounded-xl text-sm text-slate-500 hover:bg-slate-50 transition-all">
                                    ${lIdx + 1}. ${less.t}
                                </button>
                            `).join('')}
                        </div>
                    </div>
                `);
            });
        }
let currentDifficulty = 'easy';

function setDifficulty(level, btn) {
    currentDifficulty = level;
    
    // Обновляем визуальный стиль кнопок
    document.querySelectorAll('.diff-btn').forEach(b => {
        b.classList.remove('border-blue-600', 'text-blue-600');
        b.classList.add('border-transparent', 'text-slate-400');
    });
    btn.classList.add('border-blue-600', 'text-blue-600');
    btn.classList.remove('border-transparent', 'text-slate-400');

    // Обновляем текст задания
    updateTaskDisplay();
}

function updateTaskDisplay() {
    if (currentLessonData && currentLessonData.tasks) {
        const taskText = currentLessonData.tasks[currentDifficulty];
        document.getElementById('practice-task-display').innerText = taskText;
        
        // Обновляем комментарий в редакторе
        const currentCode = editor.getValue();
        const lines = currentCode.split('\n');
        lines[0] = `# задание (${currentDifficulty}): ${taskText}`;
        editor.setValue(lines.join('\n'));
    }
}

        function showLesson(bIdx, lIdx, btn) {
            const lesson = courseData[bIdx].lessons[lIdx];
            currentLessonData = lesson;
	    const firstBtn = document.querySelector('.diff-btn');
    		if (firstBtn) setDifficulty('easy', firstBtn);
    
    		updateTaskDisplay();
            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('lesson-content').classList.remove('hidden');
            document.getElementById('lesson-title').innerText = lesson.t;
            document.getElementById('lesson-theory-text').innerHTML = marked.parse(lesson.theory);
            document.getElementById('practice-task-display').innerText = lesson.a;

            document.getElementById('theory-chat-history').innerHTML = '';
            document.getElementById('practice-ai-response').classList.add('hidden');
            
            if (editor) {
                editor.setValue(`# задание: ${lesson.a}\n\n`);
                setTimeout(() => editor.refresh(), 100);
            }
            document.querySelectorAll('.lesson-item').forEach(i => i.classList.remove('active-lesson'));
            btn.classList.add('active-lesson');
            updateModelBadges();
        }

        async function callGeminiAPI(prompt, systemInstruction) {
            const apiKey = document.getElementById('gemini-key-input').value;
            if (!apiKey) return { error: true, msg: "введите ключ gemini" };
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        system_instruction: { parts: [{ text: systemInstruction }] },
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });
                const data = await response.json();
                if (data.error) return { error: true, msg: data.error.message };
                return { error: false, text: data.candidates[0].content.parts[0].text };
            } catch (e) { return { error: true, msg: "ошибка связи" }; }
        }

        async function callDeepseekAPI(prompt, systemPrompt) {
            const apiKey = document.getElementById('deepseek-key-input').value;
            if (!apiKey) return { error: true, msg: "введите ключ deepseek" };
            try {
                const response = await fetch('https://api.deepseek.com/chat/completions', {
                    method: 'post',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
                    body: JSON.stringify({
                        model: "deepseek-chat",
                        messages: [{ role: "system", content: systemPrompt }, { role: "user", content: prompt }]
                    })
                });
                const data = await response.json();
                if (data.error) return { error: true, msg: data.error.message };
                return { error: false, text: data.choices[0].message.content };
            } catch (e) { return { error: true, msg: "ошибка связи" }; }
        }

        async function dispatchAIRequest(prompt, systemPrompt) {
            const model = document.getElementById('model-select').value;
            return model === 'deepseek' ? await callDeepseekAPI(prompt, systemPrompt) : await callGeminiAPI(prompt, systemPrompt);
        }

        async function sendTheoryChat() {
            const input = document.getElementById('theory-input');
            if (!input.value || !currentLessonData) return;
            const text = input.value;
            input.value = "";
            addMessageToTheoryChat('user', text);
            addMessageToTheoryChat('ai', '', true);
            const res = await dispatchAIRequest(text, `ты — наставник. тема: ${currentLessonData.t}`);
            document.getElementById('pending-ai-msg')?.remove();
            addMessageToTheoryChat('ai', res.error ? res.msg : res.text);
        }

        async function askAIPreset(type) {
            if (!currentLessonData) return;
            const prompt = type === 'examples' ? `приведи примеры кода по теме ${currentLessonData.t}` : `объясни тему ${currentLessonData.t} проще`;
            addMessageToTheoryChat('user', type === 'examples' ? 'приведи примеры' : 'объясни проще');
            addMessageToTheoryChat('ai', '', true);
            const res = await dispatchAIRequest(prompt, "ты преподаватель python");
            document.getElementById('pending-ai-msg')?.remove();
            addMessageToTheoryChat('ai', res.error ? res.msg : res.text);
        }

        async function askAIPractice(type) {
            if (!currentLessonData) return;
            const box = document.getElementById('practice-ai-response');
            const txt = document.getElementById('practice-ai-text');
            box.classList.remove('hidden');
            txt.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            const prompt = type === 'optimize' ? `оптимизируй код:\n${editor.getValue()}` : `дай подсказку к задаче. мой код:\n${editor.getValue()}`;
            const res = await dispatchAIRequest(prompt, "ты эксперт python");
            txt.innerHTML = res.error ? `<span class="text-red-500">${res.msg}</span>` : marked.parse(res.text);
        }

        function addMessageToTheoryChat(role, text, isPending = false) {
            const history = document.getElementById('theory-chat-history');
            const div = document.createElement('div');
            div.className = `p-3 rounded-xl mb-2 text-xs ${role === 'user' ? 'bg-blue-50 ml-8' : 'bg-slate-50 mr-8 border'}`;
            if (isPending) { div.id = 'pending-ai-msg'; div.innerHTML = '<b>ии:</b> <i class="fas fa-spinner fa-spin"></i>'; }
            else { div.innerHTML = `<b>${role === 'user' ? 'обучающийся' : 'ии'}:</b> ${role === 'ai' ? marked.parse(text) : text}`; }
            history.appendChild(div);
            history.scrollTop = history.scrollHeight;
        }

        window.onload = function() {
            renderMenu();
            initEditor();
            if (typeof brython === "function") brython();
            if(localStorage.getItem('gemini_key')) document.getElementById('gemini-key-input').value = localStorage.getItem('gemini_key');
            if(localStorage.getItem('deepseek_key')) document.getElementById('deepseek-key-input').value = localStorage.getItem('deepseek_key');
            document.getElementById('model-select').addEventListener('change', updateModelBadges);
        };

	    document.addEventListener('keydown', (e) => {
	    if (e.key === 'Escape') {
 	       const chatContainer = document.getElementById('acc-theory');
 	       // Если чат сейчас в полноэкранном режиме — закрываем его
	        if (chatContainer.classList.contains('chat-fullscreen')) {
 	           toggleFullscreenChat();
 	       }
	    }
	    });
    </script>

    <script type="text/python">
    from browser import document, window
    import sys
    def run_python_code(ev):
        document["code-output"].classList.remove("hidden")
        document["output-text"].text = ""
        class Output:
            def write(self, data): document["output-text"].text += str(data)
            def flush(self): pass
        sys.stdout = Output()
        sys.stderr = Output()
        try: exec(window.editor.getValue())
        except Exception as e: print(e)
    document["run-btn"].bind("click", run_python_code)
    </script>
</body>
